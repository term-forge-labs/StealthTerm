<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#141425"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0090cc"/>
    </linearGradient>
    <linearGradient id="visor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00e5ff" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#00e5ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="roundClip">
      <rect x="0" y="0" width="256" height="256" rx="48" ry="48"/>
    </clipPath>
  </defs>

  <!-- Background fills entire icon, rounded corners via clip -->
  <g clip-path="url(#roundClip)">
    <rect x="0" y="0" width="256" height="256" fill="url(#bg)"/>

    <!-- Stealth hood / angular face silhouette — large, fills ~80% -->
    <!-- Outer hood shape -->
    <path d="M128 18 L230 90 L218 220 Q200 242 128 242 Q56 242 38 220 L26 90 Z"
          fill="#10101e" stroke="#00e5ff" stroke-width="1.2" stroke-opacity="0.25"/>

    <!-- Inner darker face area -->
    <path d="M128 50 L200 100 L192 200 Q178 218 128 218 Q78 218 64 200 L56 100 Z"
          fill="#0c0c18"/>

    <!-- === Stealth visor / eye slit — the signature element === -->
    <g filter="url(#glow2)">
      <!-- Visor slit — angular, wide, menacing -->
      <path d="M42 118 L100 130 L128 126 L156 130 L214 118 L200 140 L156 148 L128 144 L100 148 L56 140 Z"
            fill="url(#visor)" opacity="0.95"/>
      <!-- Bright visor core line -->
      <line x1="58" y1="129" x2="198" y2="129" stroke="#00e5ff" stroke-width="2" opacity="0.8"/>
    </g>

    <!-- Terminal prompt inside the face, below visor -->
    <g filter="url(#glow1)">
      <!-- Chevron > -->
      <polyline points="80,170 100,182 80,194" fill="none" stroke="#00e5ff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
      <!-- Cursor block -->
      <rect x="112" y="170" width="14" height="24" rx="2" fill="#00e5ff" opacity="0.85"/>
      <!-- Fading text lines -->
      <rect x="136" y="174" width="40" height="3" rx="1.5" fill="#00e5ff" opacity="0.3"/>
      <rect x="136" y="184" width="28" height="3" rx="1.5" fill="#00e5ff" opacity="0.15"/>
    </g>

    <!-- Scan lines across entire icon for stealth/hacker feel -->
    <g opacity="0.06">
      <line x1="0" y1="20" x2="256" y2="20" stroke="#00e5ff" stroke-width="1"/>
      <line x1="0" y1="40" x2="256" y2="40" stroke="#00e5ff" stroke-width="1"/>
      <line x1="0" y1="60" x2="256" y2="60" stroke="#00e5ff" stroke-width="1"/>
      <line x1="0" y1="80" x2="256" y2="80" stroke="#00e5ff" stroke-width="1"/>
      <line x1="0" y1="100" x2="256" y2="100" stroke="#00e5ff" stroke-width="1"/>
      <line x1="0" y1="120" x2="256" y2="120" stroke="#00e5ff" stroke-width="1"/>
      <line x1="0" y1="140" x2="256" y2="140" stroke="#00e5ff" stroke-width="1"/>
      <line x1="0" y1="160" x2="256" y2="160" stroke="#00e5ff" stroke-width="1"/>
      <line x1="0" y1="180" x2="256" y2="180" stroke="#00e5ff" stroke-width="1"/>
      <line x1="0" y1="200" x2="256" y2="200" stroke="#00e5ff" stroke-width="1"/>
      <line x1="0" y1="220" x2="256" y2="220" stroke="#00e5ff" stroke-width="1"/>
      <line x1="0" y1="240" x2="256" y2="240" stroke="#00e5ff" stroke-width="1"/>
    </g>

    <!-- Subtle angular grid lines on hood for tech feel -->
    <line x1="128" y1="18" x2="128" y2="50" stroke="#00e5ff" stroke-width="0.5" opacity="0.08"/>
    <line x1="128" y1="218" x2="128" y2="242" stroke="#00e5ff" stroke-width="0.5" opacity="0.08"/>
  </g>

  <!-- Clean rounded border -->
  <rect x="0" y="0" width="256" height="256" rx="48" ry="48" fill="none" stroke="#00e5ff" stroke-width="1.5" stroke-opacity="0.2"/>
</svg>
