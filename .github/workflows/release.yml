name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Linux: DEB + RPM ───────────────────────────────────────────────
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libwayland-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libgtk-3-dev libatk1.0-dev libglib2.0-dev \
            libpango1.0-dev libgdk-pixbuf-2.0-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Install cargo-deb & cargo-generate-rpm
        run: cargo install cargo-deb cargo-generate-rpm

      - name: Build DEB package
        run: cargo deb -p stealthterm --no-build

      - name: Build RPM package
        run: cargo generate-rpm -p crates/app

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp target/debian/*.deb dist/
          cp target/generate-rpm/*.rpm dist/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: dist/*

  # ─── macOS: DMG (universal binary) ──────────────────────────────────
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p dist
          lipo -create \
            target/aarch64-apple-darwin/release/StealthTerm \
            target/x86_64-apple-darwin/release/StealthTerm \
            -output dist/StealthTerm

      - name: Create .app bundle
        run: |
          APP="dist/StealthTerm.app/Contents"
          mkdir -p "$APP/MacOS" "$APP/Resources"
          cp dist/StealthTerm "$APP/MacOS/StealthTerm"
          cp assets/icon.png "$APP/Resources/AppIcon.png"

          # Convert PNG to icns if sips is available
          if command -v sips &>/dev/null; then
            mkdir -p dist/icon.iconset
            for size in 16 32 64 128 256 512; do
              sips -z $size $size assets/icon.png --out "dist/icon.iconset/icon_${size}x${size}.png" 2>/dev/null || true
              double=$((size * 2))
              sips -z $double $double assets/icon.png --out "dist/icon.iconset/icon_${size}x${size}@2x.png" 2>/dev/null || true
            done
            iconutil -c icns dist/icon.iconset -o "$APP/Resources/AppIcon.icns" 2>/dev/null || true
            rm -rf dist/icon.iconset
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-0.1.0}"

          cat > "$APP/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>StealthTerm</string>
            <key>CFBundleDisplayName</key>
            <string>StealthTerm</string>
            <key>CFBundleIdentifier</key>
            <string>com.stealthterm.app</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleExecutable</key>
            <string>StealthTerm</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-0.1.0}"
          hdiutil create -volname "StealthTerm" \
            -srcfolder dist/StealthTerm.app \
            -ov -format UDZO \
            "dist/StealthTerm-${VERSION}-universal.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: dist/*.dmg

  # ─── Windows: MSI + Setup.exe ───────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION:-0.1.0}" >> "$GITHUB_OUTPUT"

      - name: Install WiX 4
        run: |
          dotnet new tool-manifest
          dotnet tool install wix --version 4.0.5

      - name: Add WiX UI extension
        run: dotnet wix extension add WixToolset.UI.wixext/4.0.5

      - name: Build MSI
        shell: pwsh
        run: |
          mkdir -p dist
          dotnet wix build pkg/windows/stealthterm.wxs `
            -bindpath:BinDir=target/x86_64-pc-windows-msvc/release `
            -bindpath:AssetDir=assets `
            -o dist/StealthTerm-${{ steps.version.outputs.version }}-x64.msi

      # ── Setup.exe via Inno Setup ──
      - name: Build Setup.exe
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: pkg/windows/setup.iss
          options: /DMyAppVersion=${{ steps.version.outputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: dist/*

  # ─── Create GitHub Release ──────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/*
